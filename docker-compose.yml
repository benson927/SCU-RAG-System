services:
  postgres:
    image: postgres:16-alpine@sha256:16bc17c64a573ef34162af9298258d1aec548232985b33ed7b1eac33ba35c229
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-scu_rag}
      POSTGRES_USER: ${POSTGRES_USER:-scu_rag}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-scu_rag_dev}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-scu_rag} -d ${POSTGRES_DB:-scu_rag}"]
      interval: 3s
      timeout: 3s
      retries: 20

  minio:
    image: minio/minio@sha256:14cea493d9a34af32f524e538b8346cf79f3321eff8e708c1e2960462bd8936e
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-scu_minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-scu_minio_dev_password}
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 3s
      timeout: 3s
      retries: 20

  minio-init:
    image: minio/mc@sha256:a7fe349ef4bd8521fb8497f55c6042871b2ae640607cf99d9bede5e9bdf11727
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-scu_minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-scu_minio_dev_password}
      STORAGE_BUCKET: ${STORAGE_BUCKET:-scu-law-documents}
    entrypoint:
      - /bin/sh
      - -c
      - |
        mc alias set local http://minio:9000 "$${MINIO_ROOT_USER}" "$${MINIO_ROOT_PASSWORD}"
        mc mb --ignore-existing "local/$${STORAGE_BUCKET}"
        mc anonymous set none "local/$${STORAGE_BUCKET}"

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-scu_rag}:${POSTGRES_PASSWORD:-scu_rag_dev}@postgres:5432/${POSTGRES_DB:-scu_rag}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-scu-admin-dev}
      ADMIN_TOKEN_SECRET: ${ADMIN_TOKEN_SECRET:-scu-admin-dev-token-secret}
      STORAGE_ENDPOINT: http://minio:9000
      STORAGE_REGION: ${STORAGE_REGION:-us-east-1}
      STORAGE_BUCKET: ${STORAGE_BUCKET:-scu-law-documents}
      STORAGE_ACCESS_KEY: ${MINIO_ROOT_USER:-scu_minio}
      STORAGE_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-scu_minio_dev_password}
      STORAGE_FORCE_PATH_STYLE: "true"
      LEGACY_DATA_DIR: /app/data/legacy
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      OLLAMA_CHAT_MODEL: ${OLLAMA_CHAT_MODEL:-gemma3}
      OLLAMA_EMBEDDING_MODEL: ${OLLAMA_EMBEDDING_MODEL:-nomic-embed-text}
      OLLAMA_REQUEST_TIMEOUT_SECONDS: ${OLLAMA_REQUEST_TIMEOUT_SECONDS:-120}
      ADMIN_LOGIN_RATE_LIMIT: ${ADMIN_LOGIN_RATE_LIMIT:-5}
      RAG_RATE_LIMIT: ${RAG_RATE_LIMIT:-20}
      RATE_LIMIT_WINDOW_SECONDS: ${RATE_LIMIT_WINDOW_SECONDS:-60}
      TRUST_PROXY_HEADERS: ${TRUST_PROXY_HEADERS:-false}
      MAX_QUERY_LENGTH: ${MAX_QUERY_LENGTH:-1000}
      RAG_TIMEOUT_SECONDS: ${RAG_TIMEOUT_SECONDS:-120}
      RAG_MAX_CONCURRENCY: ${RAG_MAX_CONCURRENCY:-2}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:5173,http://127.0.0.1:5173,http://localhost:5174,http://127.0.0.1:5174}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    volumes:
      - chroma_data:/app/chroma_db
      - managed_documents:/app/data/managed_documents
      - ./data:/app/data/legacy:ro
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health/ready"]
      interval: 5s
      timeout: 3s
      retries: 30

volumes:
  postgres_data:
  minio_data:
  chroma_data:
  managed_documents:
