name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read
  security-events: write

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install Python dependencies
        run: pip install -r requirements-dev.txt

      - name: Run backend unit tests
        run: make test-unit

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Lint and build frontend
        working-directory: frontend
        run: |
          npm run lint
          npm run build

      - name: Validate repository
        run: |
          git diff --check
          test "$(find frontend/public/slides -name 'slide_*.webp' | wc -l)" -eq 9
          test "$(find data -maxdepth 1 -name '*.pdf' | wc -l)" -eq 15

      - name: Build backend image
        run: docker build -f backend/Dockerfile -t scu-rag-backend:test .

      - name: Scan tracked files for secrets
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Prepare Compose environment
        run: cp .env.compose.example .env.compose
      - name: Run PostgreSQL and MinIO integration test
        run: make test-integration

  codeql:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript,python
      - uses: github/codeql-action/autobuild@v3
      - uses: github/codeql-action/analyze@v3
